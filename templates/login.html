{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 mt-5">
        <div class="card bg-secondary text-white shadow-lg p-4">
            <h2 class="text-center mb-4">Login</h2>
            <form method="POST">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enter System</button>
            </form>
            <p class="mt-3 text-center">New? <a href="{{ url_for('register') }}" class="text-info">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
