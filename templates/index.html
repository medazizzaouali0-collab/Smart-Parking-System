<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>🚗 Smart Parking Dashboard</h1>
        <div class="summary">
            <div class="stat-box">Total Free: <span id="total-free">--</span>/15</div>
            <div class="stat-box">Row 1 Free: <span id="row1-free">--</span>/9</div>
            <div class="stat-box">Row 2 Free: <span id="row2-free">--</span>/6</div>
        </div>
    </header>

    <main class="parking-lot">
        <div class="road">Driveway</div>
        
        <div class="row row-2">
            <h3>Row 2 (Covered)</h3>
            <div class="spots" id="row-2-spots">
                <!-- Spots 10 to 15 will be generated by JS -->
            </div>
        </div>

        <div class="row row-1">
            <h3>Row 1 (Open)</h3>
            <div class="spots" id="row-1-spots">
                <!-- Spots 1 to 9 will be generated by JS -->
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>{% extends "base.html" %}
{% block content %}
<div class="row text-center mb-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white p-3 shadow">
            <h5>Total Available</h5>
            <h2 id="total-free">--</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-success text-white p-3 shadow">
            <h5>Row 1 (Open)</h5>
            <h2 id="row1-free">--</h2>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-warning text-dark p-3 shadow">
            <h5>Row 2 (Covered)</h5>
            <h2 id="row2-free">--</h2>
        </div>
    </div>
</div>

<div class="parking-map bg-black p-5 rounded shadow-lg border border-secondary">
    <div id="row-2-spots" class="d-flex justify-content-around mb-5"></div>
    <div class="road my-4 py-3 text-center border-top border-bottom border-dashed">DRIVEWAY</div>
    <div id="row-1-spots" class="d-flex justify-content-around"></div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
{% endblock %}
